services:
  db:
    image: postgres:17-alpine
    container_name: concert_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: poc-concert-notifications
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d poc-concert-notifications"]
      interval: 5s      
      timeout: 5s       
      retries: 5       
      start_period: 10s

  api:
    build:
      context: ..             
      dockerfile: docker/Dockerfile
    container_name: concert_api
    volumes:
      - ..:/app              
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/poc-concert-notifications
    depends_on:
      db :
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: concert_redis
    ports:
      - "6380:6379"

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: concert_worker
    volumes:
      - ..:/app
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/poc-concert-notifications
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: celery -A app.core.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis

  flower:
    image: mher/flower
    container_name: concert_flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

  pgadmin:
    image: dpage/pgadmin4
    container_name: concert_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: