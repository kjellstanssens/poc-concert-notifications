services:
  db:
    image: postgres:17-alpine
    container_name: concert_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: poc-concert-notifications
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d poc-concert-notifications"]
      interval: 5s      
      timeout: 5s       
      retries: 5       
      start_period: 10s

  api:
    build:
      context: ..             
      dockerfile: docker/Dockerfile
    container_name: concert_api
    volumes:
      - ..:/app              
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/poc-concert-notifications
    depends_on:
      db :
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    container_name: concert_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: